<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Depthless</title>
  <link rel="stylesheet" href="style2.css" />
</head>
<body>
  <main class="site">

    <header class="topbar">
      <img src="logo.svg" alt="Depthless" class="logo">
      <a class="email" href="mailto:see@depthless.one">see@depthless.one</a>
    </header>

    <section class="hero">
      <div class="copy-panel" aria-live="polite">
        <div id="textStage" class="text-stage">
          <div id="line1" class="line"></div>
          <div id="line2" class="line"></div>
        </div>
      </div>

      <div class="video-panel">
        <div class="video-frame">
          <video id="demoVideo" muted loop playsinline>
            <source src="demo.mp4" type="video/mp4">
          </video>
        </div>
      </div>
    </section>

  </main>

  <script src="script2.js"></script>
</body>
</html>
